name: homepage

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.3.2
    container_name: homepage
    restart: unless-stopped
    env_file:
      - .env          # platform globals (via symlink, ADR-0012)
      - .env.service  # service-specific — overrides globals on collision
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      HOMEPAGE_ALLOWED_HOSTS: home.${DOMAIN}
      HOMEPAGE_VAR_DOMAIN: ${DOMAIN} # substituted into {{HOMEPAGE_VAR_DOMAIN}} in the dashboard YAML
      LOG_TARGETS: stdout # config mount is read-only; never write a log file there → use docker logs
    volumes:
      # Repo-authored dashboards, mounted read-only (ADR-0008): the dashboard is
      # version-controlled config, not host runtime state. Directory mount (not a
      # single-file mount) so `git pull` swapping files by inode is picked up live
      # — the Caddyfile stale-inode incident (2026-07-17) applies here too.
      # Single mount is a documented deviation from the two-mount storage rule:
      # Homepage is stateless, its only persistence is this Git-tracked config.
      - ${DAHOUSELAB_ROOT}/infrastructure/configs/homepage:/app/config:ro
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      dahouselab.service: "homepage"
      dahouselab.category: "monitoring"
      dahouselab.description: "Platform dashboard"
      dahouselab.url: "https://home.${DOMAIN}"
      dahouselab.backup: "false" # config lives in Git (ADR-0008); nothing on the host to back up

networks:
  proxy:
    external: true
